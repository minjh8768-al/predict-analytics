<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — PredictAnalytics</title>
<style>
  :root {
    --bg: #0d0d1a; --surface: #16162a; --surface2: #1e1e35;
    --border: #2a2a45; --text: #e8e8f8; --text-sub: #9090b8; --text-muted: #5a5a80;
    --purple: #6c5ce7; --green: #0ea968; --red: #e03040; --yellow: #d97706;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── Auth Gate ── */
  #authGate { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; text-align: center; max-width: 360px; width: 100%; }
  .auth-logo { font-size: 18px; font-weight: 800; color: var(--purple); margin-bottom: 8px; }
  .auth-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .auth-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 24px; }
  .btn-google { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-google:hover { border-color: var(--purple); }
  #accessDenied { display: none; margin-top: 16px; font-size: 12px; color: var(--red); }

  /* ── Layout ── */
  #adminPanel { display: none; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 16px; font-weight: 800; color: var(--purple); }
  .header-badge { font-size: 11px; background: rgba(108,92,231,.2); color: var(--purple); border: 1px solid rgba(108,92,231,.3); border-radius: 6px; padding: 2px 8px; font-weight: 700; }
  .admin-name { font-size: 13px; color: var(--text-sub); }
  .btn-logout { font-size: 12px; color: var(--text-muted); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; }
  .btn-logout:hover { color: var(--red); border-color: var(--red); }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  /* ── Stats ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
  .stat-val { font-size: 26px; font-weight: 800; color: var(--text); }
  .stat-val.green { color: var(--green); }
  .stat-val.purple { color: var(--purple); }

  /* ── Toolbar ── */
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-size: 13px; outline: none; }
  .search-box::placeholder { color: var(--text-muted); }
  .search-box:focus { border-color: var(--purple); }
  .filter-btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-sub); font-size: 12px; cursor: pointer; }
  .filter-btn.active { background: rgba(108,92,231,.15); border-color: var(--purple); color: var(--purple); }
  .refresh-btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-sub); font-size: 12px; cursor: pointer; }
  .refresh-btn:hover { border-color: var(--purple); color: var(--purple); }

  /* ── Table ── */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
  tbody tr { border-top: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: rgba(108,92,231,.05); }
  td { padding: 13px 16px; font-size: 13px; color: var(--text-sub); }
  td.name { color: var(--text); font-weight: 600; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
  .avatar-placeholder { width: 30px; height: 30px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 13px; }

  /* ── Plan Badge ── */
  .plan-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .plan-free    { background: rgba(90,90,128,.15); color: var(--text-muted); border: 1px solid rgba(90,90,128,.25); }
  .plan-standard  { background: rgba(59,130,246,.12); color: #60a5fa; border: 1px solid rgba(59,130,246,.25); }
  .plan-premium { background: rgba(108,92,231,.15); color: #a78bfa; border: 1px solid rgba(108,92,231,.3); }
  .plan-supporter { background: rgba(217,119,6,.12); color: #fbbf24; border: 1px solid rgba(217,119,6,.25); }

  /* ── Plan Selector ── */
  .plan-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 4px 8px; cursor: pointer; outline: none; }
  .plan-select:focus { border-color: var(--purple); }
  .save-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--purple); background: rgba(108,92,231,.15); color: var(--purple); font-size: 11px; font-weight: 700; cursor: pointer; }
  .save-btn:hover { background: rgba(108,92,231,.3); }
  .saved-msg { font-size: 11px; color: var(--green); }

  /* ── Empty / Loading ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }
  .loading-row td { text-align: center; padding: 40px; color: var(--text-muted); }
  .dot-spin { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--purple); animation: spin 1s infinite; }
  @keyframes spin { 0%,100%{opacity:1}50%{opacity:.2} }

  @media (max-width: 640px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .toolbar { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<!-- ── 로그인 필요 화면 ── -->
<div id="authGate">
  <div class="auth-card">
    <div class="auth-logo">PredictAnalytics</div>
    <div class="auth-title">관리자 전용 페이지</div>
    <div class="auth-sub">관리자 Google 계정으로 로그인하세요</div>
    <button class="btn-google" onclick="adminLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.1 33.7 29.6 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 6 1.1 8.2 2.9l6.4-6.4C34.5 5.1 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.9 0 20.4-7.9 20.4-21 0-1.4-.1-2.7-.4-4z"/></svg>
      Google로 로그인
    </button>
    <div id="accessDenied">⚠️ 관리자 계정만 접근할 수 있습니다.</div>
  </div>
</div>

<!-- ── 관리자 패널 ── -->
<div id="adminPanel">
  <div class="header">
    <div class="header-left">
      <span class="logo">PredictAnalytics</span>
      <span class="header-badge">ADMIN</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="admin-name" id="adminName"></span>
      <button class="btn-logout" onclick="adminLogout()">로그아웃</button>
    </div>
  </div>

  <div class="container">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">전체 유저</div>
        <div class="stat-val" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">유료 구독자</div>
        <div class="stat-val green" id="statPaid">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">프리미엄</div>
        <div class="stat-val purple" id="statPremium">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">서포터</div>
        <div class="stat-val" style="color:var(--yellow)" id="statSupporter">—</div>
      </div>
    </div>

    <div class="toolbar">
      <input class="search-box" id="searchBox" placeholder="이메일 또는 이름 검색..." oninput="renderTable()">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" data-filter="free" onclick="setFilter('free',this)">무료</button>
      <button class="filter-btn" data-filter="paid" onclick="setFilter('paid',this)">유료</button>
      <button class="refresh-btn" onclick="loadUsers()">↻ 새로고침</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>이름</th>
            <th>이메일</th>
            <th>플랜</th>
            <th>결제일</th>
            <th>PayPal ID</th>
            <th>플랜 변경</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          <tr class="loading-row"><td colspan="7"><span class="dot-spin"></span> 불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, collection, getDocs, doc, updateDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDPnNCfbUSQXfmYhT4g1NMQcfXrVC20Cp0",
    authDomain: "zenithgate-172ec.firebaseapp.com",
    projectId: "zenithgate-172ec",
    storageBucket: "zenithgate-172ec.firebasestorage.app",
    messagingSenderId: "237160059075",
    appId: "1:237160059075:web:3cdf8044bf24a7519c1276"
  };

  const ADMIN_EMAILS = ['minjh8768@skycamp.co.kr', 'minjh8768@gmail.com'];
  const PLAN_LABELS = { free: '무료', standard: '스탠다드', premium: '프리미엄', supporter: '서포터' };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let allUsers = [];
  let currentFilter = 'all';

  // ── 로그인 ──
  window.adminLogin = async function() {
    try {
      const result = await signInWithPopup(auth, provider);
      if (!ADMIN_EMAILS.includes(result.user.email)) {
        await signOut(auth);
        document.getElementById('accessDenied').style.display = 'block';
      }
    } catch (e) { alert('로그인 실패: ' + e.message); }
  };

  window.adminLogout = async function() {
    await signOut(auth);
    document.getElementById('authGate').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
  };

  onAuthStateChanged(auth, (u) => {
    if (u && ADMIN_EMAILS.includes(u.email)) {
      document.getElementById('authGate').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      document.getElementById('adminName').textContent = u.displayName || u.email;
      loadUsers();
    } else if (!u) {
      document.getElementById('authGate').style.display = 'flex';
      document.getElementById('adminPanel').style.display = 'none';
    }
  });

  // ── 유저 목록 로드 ──
  window.loadUsers = async function() {
    document.getElementById('userTableBody').innerHTML =
      '<tr class="loading-row"><td colspan="7"><span class="dot-spin"></span> 불러오는 중...</td></tr>';
    try {
      const snap = await getDocs(collection(db, 'users'));
      allUsers = [];
      snap.forEach(d => allUsers.push({ uid: d.id, ...d.data() }));
      allUsers.sort((a, b) => (b.planUpdatedAt?.seconds || 0) - (a.planUpdatedAt?.seconds || 0));
      updateStats();
      renderTable();
    } catch (e) {
      document.getElementById('userTableBody').innerHTML =
        `<tr class="loading-row"><td colspan="7" style="color:var(--red)">오류: ${e.message}<br><small>Firestore 보안 규칙을 확인하세요</small></td></tr>`;
    }
  };

  function updateStats() {
    const paid = allUsers.filter(u => u.plan !== 'free');
    document.getElementById('statTotal').textContent = allUsers.length;
    document.getElementById('statPaid').textContent = paid.length;
    document.getElementById('statPremium').textContent = allUsers.filter(u => u.plan === 'premium').length;
    document.getElementById('statSupporter').textContent = allUsers.filter(u => u.plan === 'supporter').length;
  }

  window.setFilter = function(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderTable();
  };

  window.renderTable = function() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    let rows = allUsers.filter(u => {
      const matchQ = !q || (u.email || '').toLowerCase().includes(q) || (u.name || '').toLowerCase().includes(q);
      const matchF = currentFilter === 'all' ? true :
                     currentFilter === 'paid' ? u.plan !== 'free' :
                     u.plan === currentFilter;
      return matchQ && matchF;
    });

    if (!rows.length) {
      document.getElementById('userTableBody').innerHTML =
        '<tr><td colspan="7" class="empty">조건에 맞는 유저가 없습니다.</td></tr>';
      return;
    }

    document.getElementById('userTableBody').innerHTML = rows.map(u => {
      const date = u.planUpdatedAt?.toDate ? fmtDate(u.planUpdatedAt.toDate()) : (u.planUpdatedAt ? '—' : '—');
      const planClass = `plan-${u.plan || 'free'}`;
      const planLabel = PLAN_LABELS[u.plan] || '무료';
      const orderId = u.paypalOrderId ? `<small style="font-size:10px;color:var(--text-muted)">${u.paypalOrderId.slice(0,12)}…</small>` : '—';
      return `<tr>
        <td><div class="avatar-placeholder">👤</div></td>
        <td class="name">${esc(u.name || '—')}</td>
        <td>${esc(u.email || '—')}</td>
        <td><span class="plan-badge ${planClass}">${planLabel}</span></td>
        <td>${date}</td>
        <td>${orderId}</td>
        <td>
          <div style="display:flex;align-items:center;gap:6px">
            <select class="plan-select" id="sel-${u.uid}">
              <option value="free"    ${u.plan==='free'    ?'selected':''}>무료</option>
              <option value="standard"  ${u.plan==='standard'  ?'selected':''}>스탠다드</option>
              <option value="premium" ${u.plan==='premium' ?'selected':''}>프리미엄</option>
              <option value="supporter" ${u.plan==='supporter'?'selected':''}>서포터</option>
            </select>
            <button class="save-btn" onclick="changePlan('${u.uid}')">저장</button>
            <span class="saved-msg" id="msg-${u.uid}" style="display:none">✓</span>
          </div>
        </td>
      </tr>`;
    }).join('');
  };

  window.changePlan = async function(uid) {
    const sel = document.getElementById('sel-' + uid);
    const newPlan = sel.value;
    try {
      await updateDoc(doc(db, 'users', uid), { plan: newPlan, planUpdatedAt: serverTimestamp() });
      // allUsers 로컬 캐시도 업데이트
      const u = allUsers.find(x => x.uid === uid);
      if (u) u.plan = newPlan;
      updateStats();
      renderTable();
      // 저장됨 표시 (renderTable 이후 다시 show)
      const msg = document.getElementById('msg-' + uid);
      if (msg) { msg.style.display = 'inline'; setTimeout(() => { msg.style.display = 'none'; }, 2000); }
    } catch (e) { alert('변경 실패: ' + e.message); }
  };

  function fmtDate(d) {
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
