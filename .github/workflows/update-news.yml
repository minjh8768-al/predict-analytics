name: Daily Trump News Update

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 00:00 UTC = 09:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and update Trump news
        run: python3 update_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if ! git diff --staged --quiet; then
            git commit -m "🗞️ 뉴스 자동 업데이트 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
            git push
          else
            echo "변경사항 없음"
          fi
